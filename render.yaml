services:
  - type: web
    name: demand-planning-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app,http://localhost:3000
      - key: PYTHON_VERSION
        value: "3.11.12"
